services:
  python:
    build:
      context: ./apps/python
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 5

  nextjs:
    build:
      context: .
      dockerfile: apps/nextjs/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PYTHON_API_URL=http://python:8000
    depends_on:
      python:
        condition: service_healthy
